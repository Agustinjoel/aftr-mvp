# Render.com blueprint for AFTR API
# Deploy: connect repo and use this blueprint, or set buildCommand/startCommand in dashboard.
#
# To populate dashboard data (ROI, picks, combos, chart) on each deploy, set startCommand in
# Render dashboard to:
#   python -m app.cli refresh && uvicorn app.main:app --host 0.0.0.0 --port $PORT
# See DEPLOY_DATA.md for data sources and options (startup refresh, persistent disk, seed).
services:
  - type: web
    name: aftr-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
